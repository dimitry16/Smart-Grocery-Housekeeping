name: Application Backend CI

on:
  push:
    branches: ["main"]
    paths:
      - 'backend/**'
  pull_request:
    branches: ["main"]
    paths:
      - 'backend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_PORT: 5432
          POSTGRES_DB: db_name
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with ruff
        run: |
          ruff check --output-format=github --target-version=py314
          ruff format --diff --target-version=py314

      - name: Test with pytest
        env:
          SECRET_KEY: ${{secrets.SECRET_KEY}}
          DATABASE_URL: postgresql+asyncpg://testuser:testpassword@localhost:5432/db_name
          TEST_DATABASE_URL: postgresql+asyncpg://testuser:testpassword@localhost:5432/db_name
        run: |
          coverage run -m pytest -v -s tests/
      - name: Generate Coverage Report
        run: |
          coverage report -m --include="tests/test_*.py"